<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#eef2f9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="moodlog">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%239db3d4' width='180' height='180'/><text x='50%' y='50%' font-size='60' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central' font-family='system-ui'>📊</text></svg>">
    <link rel="manifest" href="data:application/json,{\"name\":\"moodlog\",\"short_name\":\"moodlog\",\"description\":\"Track your mood, understand your patterns\",\"start_url\":\"./\",\"display\":\"standalone\",\"background_color\":\"#eef2f9\",\"theme_color\":\"#9db3d4\",\"scope\":\"/\",\"icons\":[{\"src\":\"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%239db3d4' width='192' height='192' rx='45'/><text x='50%' y='50%' font-size='80' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central' font-family='system-ui'>📊</text></svg>\",\"sizes\":\"192x192\",\"type\":\"image/svg+xml\",\"purpose\":\"any\"}]}">
    <title>moodlog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eef2f9 0%, #e8ecf5 100%);
            color: #2d2d2d;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            text-align: center;
            flex: 1;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #5a6e8f;
            margin-bottom: 8px;
            text-transform: lowercase;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 13px;
            color: #8b94a8;
            font-weight: 400;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        .settings-panel {
            background: white;
            border-radius: 8px;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(90, 110, 143, 0.08);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
            flex: 0 0 auto;
            max-width: 280px;
        }

        .settings-label {
            font-size: 11px;
            font-weight: 600;
            color: #5a6e8f;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        .bg-options {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .bg-btn {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .bg-btn:hover {
            transform: scale(1.1);
        }

        .bg-btn.active {
            border-color: #5a6e8f;
            box-shadow: 0 0 8px rgba(90, 110, 143, 0.3);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .mood-input-section {
            background: white;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(90, 110, 143, 0.08);
            border-top: 3px solid #9db3d4;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #5a6e8f;
            margin-bottom: 10px;
            text-transform: lowercase;
            letter-spacing: 1px;
        }

        .mood-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .mood-btn {
            padding: 10px 14px;
            border: 1.5px solid #d0dae8;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            font-weight: 500;
            text-transform: lowercase;
            letter-spacing: 0.5px;
            color: #8b94a8;
        }

        .mood-btn:hover {
            border-color: #9db3d4;
            color: #9db3d4;
            background: #f5f9fc;
        }

        .mood-btn.active {
            border-color: #9db3d4;
            background: linear-gradient(135deg, #e8f2f8 0%, #d8e8f3 100%);
            color: #7a9fb0;
            box-shadow: 0 2px 8px rgba(157, 179, 212, 0.2);
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid #d0dae8;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.2s ease, background-color 0.2s ease;
            color: #5a6e8f;
        }

        textarea::placeholder {
            color: #c0cbdb;
            text-transform: lowercase;
        }

        textarea:focus {
            outline: none;
            border-color: #9db3d4;
            background: #fafbfc;
        }

        .date-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d0dae8;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s ease;
            color: #5a6e8f;
        }

        .date-input:focus {
            outline: none;
            border-color: #9db3d4;
        }

        .btn-save {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #9db3d4 0%, #7a9fb0 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(157, 179, 212, 0.35);
        }

        .btn-save:active {
            transform: translateY(0);
        }

        /* Calendar Styles */
        .calendar-section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(90, 110, 143, 0.08);
            border-top: 3px solid #9db3d4;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-title {
            font-size: 13px;
            font-weight: 600;
            color: #5a6e8f;
            text-transform: lowercase;
            letter-spacing: 1px;
        }

        .calendar-nav {
            display: flex;
            gap: 8px;
        }

        .calendar-nav button {
            background: #f0f4f9;
            border: 1px solid #d0dae8;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            color: #9db3d4;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .calendar-nav button:hover {
            background: #e8f2f8;
            border-color: #9db3d4;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }

        .calendar-day-header {
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: #8b94a8;
            padding: 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .calendar-day {
            aspect-ratio: 1;
            border: 1px solid #d0dae8;
            border-radius: 6px;
            padding: 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #fafbfc;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .calendar-day:hover {
            border-color: #9db3d4;
            background: #f0f8fb;
        }

        .calendar-day.empty {
            background: white;
            cursor: default;
        }

        .calendar-day.has-mood {
            background: linear-gradient(135deg, #d8e8f3 0%, #e8f2f8 100%);
            border-color: #9db3d4;
            font-weight: 600;
        }

        .calendar-day-number {
            font-size: 11px;
            color: #5a6e8f;
            font-weight: 500;
        }

        .calendar-day-moods {
            font-size: 8px;
            color: #9db3d4;
            line-height: 1.2;
            margin-top: 2px;
            max-height: 20px;
            overflow: hidden;
        }

        .history-section {
            margin-top: 32px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: #5a6e8f;
            margin-bottom: 16px;
            text-transform: lowercase;
            letter-spacing: 1px;
        }

        .mood-entry {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 3px solid #9db3d4;
            box-shadow: 0 2px 8px rgba(90, 110, 143, 0.06);
            transition: all 0.2s ease;
        }

        .mood-entry:hover {
            box-shadow: 0 4px 12px rgba(90, 110, 143, 0.12);
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .entry-date {
            font-size: 11px;
            color: #8b94a8;
            font-weight: 500;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        .entry-moods {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .mood-tag {
            display: inline-block;
            background: linear-gradient(135deg, #d8e8f3 0%, #e8f2f8 100%);
            color: #7a9fb0;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            text-transform: lowercase;
        }

        .entry-note {
            font-size: 13px;
            color: #5a6e8f;
            line-height: 1.6;
            margin-top: 8px;
        }

        .btn-delete {
            background: #f0e8e3;
            color: #9a8a7e;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s ease;
            font-weight: 500;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        .btn-delete:hover {
            background: #e8d4cc;
            color: #d9534f;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state p {
            font-size: 13px;
            color: #c0cbdb;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8fafc 0%, #f0f8fb 100%);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(90, 110, 143, 0.06);
            border-top: 2px solid #9db3d4;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #5a6e8f;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: #8b94a8;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        .mood-distribution {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(90, 110, 143, 0.06);
        }

        .distribution-item {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            gap: 12px;
        }

        .distribution-item:last-child {
            margin-bottom: 0;
        }

        .mood-label {
            font-size: 11px;
            font-weight: 500;
            color: #5a6e8f;
            min-width: 60px;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        .distribution-bar {
            flex: 1;
            height: 5px;
            background: #d0dae8;
            border-radius: 3px;
            overflow: hidden;
        }

        .distribution-fill {
            height: 100%;
            background: linear-gradient(90deg, #9db3d4 0%, #b5c5e0 100%);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .distribution-count {
            font-size: 11px;
            color: #8b94a8;
            min-width: 25px;
            text-align: right;
        }

        @media (max-width: 1000px) {
            header {
                flex-direction: column;
                gap: 16px;
            }

            .settings-panel {
                width: 100%;
                justify-content: center;
                max-width: none;
            }

            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            header {
                margin-bottom: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .settings-panel {
                padding: 10px 12px;
                gap: 10px;
            }

            .mood-selector {
                gap: 6px;
            }

            .mood-btn {
                padding: 8px 12px;
                font-size: 11px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .calendar-grid {
                gap: 4px;
            }

            .calendar-day {
                font-size: 10px;
            }

            .bg-btn {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>moodlog</h1>
                <p class="subtitle">track your mood, understand your patterns</p>
            </div>
            <div class="settings-panel">
                <span class="settings-label">theme:</span>
                <div class="bg-options" id="bgOptions"></div>
            </div>
        </header>

        <div class="main-layout">
            <!-- Input Section -->
            <div class="mood-input-section">
                <div class="form-group">
                    <label for="date">date</label>
                    <input type="date" id="date" class="date-input">
                </div>

                <div class="form-group">
                    <label>how are you feeling? (select multiple)</label>
                    <div class="mood-selector">
                        <button class="mood-btn" data-mood="sad">sad</button>
                        <button class="mood-btn" data-mood="anxious">anxious</button>
                        <button class="mood-btn" data-mood="bored">bored</button>
                        <button class="mood-btn" data-mood="angry">angry</button>
                        <button class="mood-btn" data-mood="manic">manic</button>
                        <button class="mood-btn" data-mood="calm">calm</button>
                        <button class="mood-btn" data-mood="hopeful">hopeful</button>
                        <button class="mood-btn" data-mood="tired">tired</button>
                        <button class="mood-btn" data-mood="lonely">lonely</button>
                        <button class="mood-btn" data-mood="content">content</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="note">notes (optional)</label>
                    <textarea id="note" placeholder="what's on your mind?"></textarea>
                </div>

                <button class="btn-save">save</button>
            </div>

            <!-- Calendar Section -->
            <div class="calendar-section">
                <div class="calendar-header">
                    <div class="calendar-title">mood calendar</div>
                    <div class="calendar-nav">
                        <button id="prev-month">← prev</button>
                        <button id="next-month">next →</button>
                    </div>
                </div>
                <div id="calendar"></div>
            </div>
        </div>

        <div class="history-section">
            <h2 class="section-title">overview</h2>
            <div class="stats-grid" id="stats"></div>
            <div class="mood-distribution" id="distribution"></div>

            <h2 class="section-title">recent entries</h2>
            <div id="history"></div>
        </div>
    </div>

    <script>
        const moods = ['sad', 'anxious', 'bored', 'angry', 'manic', 'calm', 'hopeful', 'tired', 'lonely', 'content'];
        const moodValues = { 
            'sad': 1, 
            'anxious': 2, 
            'bored': 2, 
            'angry': 2, 
            'manic': 3, 
            'tired': 2, 
            'lonely': 1, 
            'calm': 4, 
            'hopeful': 5, 
            'content': 5 
        };

        const backgroundThemes = {
            periwinkle: 'linear-gradient(135deg, #eef2f9 0%, #e8ecf5 100%)',
            lavender: 'linear-gradient(135deg, #f5e8f8 0%, #ede1f3 100%)',
            lilac: 'linear-gradient(135deg, #f0e8fa 0%, #e6d9f0 100%)',
            mint: 'linear-gradient(135deg, #e8f5f1 0%, #dff0eb 100%)',
            sage: 'linear-gradient(135deg, #e8f1eb 0%, #dce8e0 100%)',
            peach: 'linear-gradient(135deg, #f9ede8 0%, #f3e1d8 100%)',
            rose: 'linear-gradient(135deg, #f9ebe8 0%, #f0dbd6 100%)',
            coral: 'linear-gradient(135deg, #fbe8e3 0%, #f5d9ce 100%)',
            cream: 'linear-gradient(135deg, #fdf9f4 0%, #f5ede4 100%)',
            pale: 'linear-gradient(135deg, #f5f5f5 0%, #ececec 100%)',
            sky: 'linear-gradient(135deg, #e3f2fd 0%, #d1e7f5 100%)',
            ocean: 'linear-gradient(135deg, #dde9f5 0%, #cfe0ef 100%)',
            butter: 'linear-gradient(135deg, #fffae8 0%, #fff5cc 100%)',
            honeydew: 'linear-gradient(135deg, #f0fde8 0%, #e5fad9 100%)',
            blush: 'linear-gradient(135deg, #ffe8f0 0%, #ffd9e6 100%)'
        };

        let selectedMoods = [];
        let currentCalendarDate = new Date();
        let currentTheme = 'periwinkle';

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>e.waitUntil(clients.claim()));').catch(() => {});
        }

        // Initialize
        initializeThemeSelector();
        const dateInput = document.getElementById('date');
        dateInput.valueAsDate = new Date();

        function initializeThemeSelector() {
            const bgOptions = document.getElementById('bgOptions');
            const savedTheme = localStorage.getItem('moodlogTheme') || 'periwinkle';
            currentTheme = savedTheme;

            Object.keys(backgroundThemes).forEach(theme => {
                const btn = document.createElement('button');
                btn.className = 'bg-btn';
                btn.style.background = backgroundThemes[theme];
                btn.title = theme;
                if (theme === savedTheme) {
                    btn.classList.add('active');
                }
                btn.addEventListener('click', () => setTheme(theme));
                bgOptions.appendChild(btn);
            });

            applyTheme(savedTheme);
        }

        function setTheme(theme) {
            currentTheme = theme;
            localStorage.setItem('moodlogTheme', theme);
            applyTheme(theme);

            document.querySelectorAll('.bg-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function applyTheme(theme) {
            document.body.style.background = backgroundThemes[theme];
            document.querySelector('meta[name="theme-color"]').setAttribute('content', backgroundThemes[theme].split('(')[1].split(' ')[0]);
        }

        // Mood selection (now supports multiple)
        document.querySelectorAll('.mood-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                btn.classList.toggle('active');
                const mood = btn.dataset.mood;
                if (btn.classList.contains('active')) {
                    if (!selectedMoods.includes(mood)) {
                        selectedMoods.push(mood);
                    }
                } else {
                    selectedMoods = selectedMoods.filter(m => m !== mood);
                }
            });
        });

        // Save entry
        document.querySelector('.btn-save').addEventListener('click', saveEntry);

        // Calendar navigation
        document.getElementById('prev-month').addEventListener('click', () => {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() - 1);
            renderCalendar();
        });

        document.getElementById('next-month').addEventListener('click', () => {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + 1);
            renderCalendar();
        });

        function saveEntry() {
            const date = document.getElementById('date').value;
            const note = document.getElementById('note').value;

            if (!date || selectedMoods.length === 0) {
                alert('please select a date and at least one mood');
                return;
            }

            const entries = JSON.parse(localStorage.getItem('moodEntries')) || [];
            entries.push({
                date,
                moods: selectedMoods,
                note,
                id: Date.now()
            });

            localStorage.setItem('moodEntries', JSON.stringify(entries));

            // Reset form
            document.getElementById('note').value = '';
            selectedMoods = [];
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
            dateInput.valueAsDate = new Date();

            updateDisplay();
        }

        function updateDisplay() {
            const entries = JSON.parse(localStorage.getItem('moodEntries')) || [];
            
            // Sort by date, newest first
            entries.sort((a, b) => new Date(b.date) - new Date(a.date));

            // Update stats
            updateStats(entries);

            // Update distribution
            updateDistribution(entries);

            // Update history
            updateHistory(entries);

            // Update calendar
            renderCalendar();
        }

        function updateStats(entries) {
            const statsDiv = document.getElementById('stats');
            
            const totalEntries = entries.length;
            
            // Calculate average mood based on all moods
            let totalMoodValue = 0;
            let totalMoods = 0;
            entries.forEach(e => {
                e.moods.forEach(mood => {
                    totalMoodValue += moodValues[mood];
                    totalMoods++;
                });
            });
            const avgMood = totalMoods > 0 ? (totalMoodValue / totalMoods).toFixed(1) : 0;

            const last7Days = entries.filter(e => {
                const entryDate = new Date(e.date);
                const sevenDaysAgo = new Date();
                sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
                return entryDate >= sevenDaysAgo;
            }).length;

            const currentStreak = calculateStreak(entries);

            statsDiv.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalEntries}</div>
                    <div class="stat-label">total entries</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${avgMood}</div>
                    <div class="stat-label">avg mood</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${last7Days}</div>
                    <div class="stat-label">last 7 days</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${currentStreak}</div>
                    <div class="stat-label">day streak</div>
                </div>
            `;
        }

        function calculateStreak(entries) {
            if (entries.length === 0) return 0;

            const sortedEntries = [...entries].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            let streak = 1;
            for (let i = 0; i < sortedEntries.length - 1; i++) {
                const current = new Date(sortedEntries[i].date);
                const next = new Date(sortedEntries[i + 1].date);
                const diff = (current - next) / (1000 * 60 * 60 * 24);
                
                if (diff === 1) {
                    streak++;
                } else {
                    break;
                }
            }
            return streak;
        }

        function updateDistribution(entries) {
            const distributionDiv = document.getElementById('distribution');
            const counts = {};
            moods.forEach(mood => counts[mood] = 0);

            // Count all moods
            entries.forEach(e => {
                e.moods.forEach(mood => {
                    counts[mood]++;
                });
            });

            const total = Object.values(counts).reduce((a, b) => a + b, 0) || 1;

            distributionDiv.innerHTML = `
                ${moods.map(mood => {
                    const count = counts[mood];
                    const percentage = (count / total) * 100;
                    return `
                        <div class="distribution-item">
                            <div class="mood-label">${mood}</div>
                            <div class="distribution-bar">
                                <div class="distribution-fill" style="width: ${percentage}%"></div>
                            </div>
                            <div class="distribution-count">${count}</div>
                        </div>
                    `;
                }).join('')}
            `;
        }

        function updateHistory(entries) {
            const historyDiv = document.getElementById('history');

            if (entries.length === 0) {
                historyDiv.innerHTML = '<div class="empty-state"><p>no entries yet. start tracking your mood.</p></div>';
                return;
            }

            historyDiv.innerHTML = entries.map(entry => `
                <div class="mood-entry">
                    <div class="entry-header">
                        <div class="entry-date">${new Date(entry.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
                        <button class="btn-delete" onclick="deleteEntry(${entry.id})">delete</button>
                    </div>
                    <div class="entry-moods">
                        ${entry.moods.map(mood => `<span class="mood-tag">${mood}</span>`).join('')}
                    </div>
                    ${entry.note ? `<div class="entry-note">${entry.note}</div>` : ''}
                </div>
            `).join('');
        }

        function deleteEntry(id) {
            if (confirm('are you sure?')) {
                const entries = JSON.parse(localStorage.getItem('moodEntries')) || [];
                const filtered = entries.filter(e => e.id !== id);
                localStorage.setItem('moodEntries', JSON.stringify(filtered));
                updateDisplay();
            }
        }

        function renderCalendar() {
            const calendarDiv = document.getElementById('calendar');
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDayOfWeek = firstDay.getDay();

            const entries = JSON.parse(localStorage.getItem('moodEntries')) || [];
            const entriesByDate = {};
            entries.forEach(e => {
                if (!entriesByDate[e.date]) {
                    entriesByDate[e.date] = [];
                }
                entriesByDate[e.date].push(...e.moods);
            });

            let html = `
                <div style="text-align: center; margin-bottom: 16px; font-size: 13px; font-weight: 600; color: #5a6e8f; text-transform: lowercase; letter-spacing: 0.5px;">
                    ${firstDay.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
                </div>
                <div class="calendar-grid">
            `;

            // Day headers
            const dayHeaders = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
            dayHeaders.forEach(day => {
                html += `<div class="calendar-day-header">${day}</div>`;
            });

            // Empty cells before month starts
            for (let i = 0; i < startingDayOfWeek; i++) {
                html += '<div class="calendar-day empty"></div>';
            }

            // Days of month
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayMoods = entriesByDate[dateStr] || [];
                const hasEntry = dayMoods.length > 0;

                html += `<div class="calendar-day ${hasEntry ? 'has-mood' : ''}">
                    <div class="calendar-day-number">${day}</div>
                    ${hasEntry ? `<div class="calendar-day-moods">${dayMoods.slice(0, 2).join(' ')}</div>` : ''}
                </div>`;
            }

            html += '</div>';
            calendarDiv.innerHTML = html;
        }

        // Initial display
        updateDisplay();
    </script>
</body>
</html>
